<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNO 生词 · 水果</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f0f1e; color: white; min-height: 100vh; }
#app { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 12px; }

/* Lobby */
.lobby { text-align: center; max-width: 400px; width: 100%; }
.lobby h1 { font-size: 2.5rem; margin-bottom: .5rem; }
.lobby p { opacity: .7; margin-bottom: 1.5rem; font-size: .9rem; }
.form-row { display: flex; flex-direction: column; gap: 10px; }
input[type=text] { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: white; padding: 12px 16px; font-size: 15px; outline: none; }
input[type=text]::placeholder { opacity: .5; }
input[type=text]:focus { border-color: #e74c3c; }
.btn { background: #e74c3c; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; cursor: pointer; font-weight: 600; transition: transform .1s, background .2s; width: 100%; }
.btn:hover { background: #c0392b; transform: scale(1.02); }
.btn:active { transform: scale(.97); }
.btn-green { background: #27ae60; } .btn-green:hover { background: #1e8449; }
.btn-gray { background: rgba(255,255,255,0.15); } .btn-gray:hover { background: rgba(255,255,255,0.25); }
.btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }
.error-msg { color: #e74c3c; font-size: 13px; margin-top: 6px; }

/* Game area */
.game { width: 100%; max-width: 660px; }
.status-bar { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 16px; margin: 8px 0; font-size: 14px; text-align: center; line-height: 1.4; }
.table-center { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 12px 0; }

/* Cards */
.card { width: 68px; height: 96px; border-radius: 10px; border: 3px solid rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; user-select: none; transition: transform .15s; box-shadow: 2px 3px 8px rgba(0,0,0,0.5); flex-shrink: 0; }
.card.playable:hover { transform: translateY(-10px) scale(1.07); box-shadow: 0 6px 20px rgba(255,255,0,0.3); }
.card.playable { border-color: #f1c40f; }
.card .corner { position: absolute; font-size: 11px; font-weight: 700; color: white; }
.card .corner.tl { top: 3px; left: 5px; }
.card .corner.br { bottom: 3px; right: 5px; transform: rotate(180deg); }
.card .emoji { font-size: 22px; line-height: 1; }
.card .cn { font-size: 12px; font-weight: 700; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,.6); margin-top: 1px; }
.card .py { font-size: 8px; opacity: .9; color: white; }

.draw-pile { width: 76px; height: 108px; border-radius: 10px; border: 3px solid rgba(255,255,255,0.5); background: linear-gradient(135deg, #922b21, #e74c3c); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform .1s; font-size: 28px; }
.draw-pile:hover { transform: scale(1.05); }
.draw-pile span { font-size: 11px; opacity: .8; margin-top: 4px; }
.discard-area { width: 76px; height: 108px; border-radius: 10px; border: 3px dashed rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; }

/* Players layout */
.opponents { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 8px 0; }
.opp-zone { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 120px; transition: background .2s, border .2s; border: 2px solid transparent; }
.opp-zone.active { background: rgba(255,215,0,0.12); border-color: #f1c40f; }
.opp-zone.empty { opacity: .3; }
.opp-name { font-size: 13px; margin-bottom: 6px; font-weight: 600; }
.opp-cards { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; }
.mini-card { width: 28px; height: 40px; border-radius: 5px; border: 2px solid white; background: linear-gradient(135deg, #922b21, #e74c3c); }

.my-area { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; margin: 6px 0; border: 2px solid transparent; transition: border .2s; }
.my-area.active { border-color: #f1c40f; }
.my-label { font-size: 13px; margin-bottom: 8px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
.hand { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }

/* Color picker */
.color-picker-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; }
.color-picker-box { background: #1a1a2e; border-radius: 16px; border: 2px solid #555; padding: 24px; text-align: center; }
.color-picker-box h3 { margin-bottom: 16px; font-size: 18px; }
.colors { display: flex; gap: 12px; justify-content: center; }
.color-dot { width: 56px; height: 56px; border-radius: 50%; border: 3px solid white; cursor: pointer; transition: transform .1s; }
.color-dot:hover { transform: scale(1.15); }

/* Win overlay */
.win-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: #1a1a2e; border-radius: 16px; border: 3px solid #f1c40f; padding: 2rem; text-align: center; max-width: 340px; }

/* Color indicator */
.color-dot-sm { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); display: inline-block; vertical-align: middle; margin-left: 5px; }

.players-waiting { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
.player-slot { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
.player-slot.filled { background: rgba(39,174,96,0.2); border: 1px solid #27ae60; }
.slot-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const COLORS_HEX = { red: '#e74c3c', green: '#27ae60', blue: '#2980b9', yellow: '#f39c12' };
const COLOR_ZH = { red: '红色', green: '绿色', blue: '蓝色', yellow: '黄色' };
const FRUITS = [
  { emoji: '🍎', chinese: '苹果', pinyin: 'píng guǒ' },
  { emoji: '🍇', chinese: '葡萄', pinyin: 'pútáo' },
  { emoji: '🍌', chinese: '香蕉', pinyin: 'xiāngjiāo' },
  { emoji: '🍊', chinese: '橘子', pinyin: 'júzi' },
  { emoji: '🍍', chinese: '菠萝', pinyin: 'bōluó' },
  { emoji: '🥭', chinese: '芒果', pinyin: 'mángguǒ' },
  { emoji: '🍓', chinese: '草莓', pinyin: 'cǎoméi' },
  { emoji: '🍈', chinese: '木瓜', pinyin: 'mùguā' },
  { emoji: '🍋', chinese: '榴莲', pinyin: 'liúlián' },
];

const socket = io();
let myState = null;
let roomId = null;
let playerName = null;
let pickingColor = false;

socket.on('state', (state) => {
  myState = state;
  pickingColor = (state.phase === 'pickcolor' && state.myIndex === state.current);
  render();
});
socket.on('error', (msg) => { alert(msg); });

function joinRoom() {
  roomId = document.getElementById('roomInput').value.trim() || 'room1';
  playerName = document.getElementById('nameInput').value.trim() || 'ผู้เล่น';
  socket.emit('joinRoom', { roomId, playerName });
}

function startGame() { socket.emit('startGame'); }
function restartGame() { socket.emit('restartGame'); }
function drawCard() { socket.emit('drawCard'); }
function playCard(id) { socket.emit('playCard', { cardId: id }); }
function pickColor(color) { socket.emit('pickColor', { color }); pickingColor = false; }

function cardHTML(card, playable = false) {
  if (!card) return '';
  const bg = card.color ? COLORS_HEX[card.color] : '#2c3e50';
  let mid = '', corner = '';
  if (card.type === 'number') {
    const f = FRUITS[card.value];
    mid = `<span class="emoji">${f.emoji}</span><span class="cn">${f.chinese}</span><span class="py">${f.pinyin}</span>`;
    corner = card.value;
  } else if (card.type === 'skip') { mid = `<span class="emoji">🚫</span><span class="cn">跳过</span>`; corner = '⊘'; }
  else if (card.type === 'reverse') { mid = `<span class="emoji">🔄</span><span class="cn">反转</span>`; corner = '↺'; }
  else if (card.type === '+2') { mid = `<span class="emoji" style="font-size:18px">+2</span><span class="cn">抽牌</span>`; corner = '+2'; }
  else if (card.type === 'wild') { mid = `<span class="emoji">🌈</span><span class="cn">变色</span>`; corner = 'W'; }
  else if (card.type === 'wild+4') { mid = `<span class="emoji" style="font-size:16px">🌈+4</span><span class="cn">变色</span>`; corner = 'W4'; }
  const cls = playable ? ' playable' : '';
  const onclick = playable ? `onclick="playCard(${card.id})"` : '';
  return `<div class="card${cls}" style="background:${bg}" ${onclick}>
    <span class="corner tl">${corner}</span>${mid}<span class="corner br">${corner}</span>
  </div>`;
}

function render() {
  const app = document.getElementById('app');
  if (!myState) { app.innerHTML = lobbyHTML(); return; }
  const s = myState;
  if (s.phase === 'waiting' || !s.started) { app.innerHTML = waitingHTML(s); return; }
  app.innerHTML = gameHTML(s);
  if (s.phase === 'win') document.getElementById('app').insertAdjacentHTML('beforeend', winHTML(s));
  if (pickingColor) document.getElementById('app').insertAdjacentHTML('beforeend', colorPickerHTML());
}

function lobbyHTML() {
  return `<div class="lobby">
    <div style="font-size:48px;margin-bottom:.5rem;">🃏</div>
    <h1>UNO 生词</h1>
    <p>水果 · shuǐguǒ · ผลไม้<br>เล่นได้ 2-4 คน พร้อมกัน</p>
    <div class="form-row">
      <input type="text" id="nameInput" placeholder="ชื่อผู้เล่นของคุณ / 你的名字" maxlength="20">
      <input type="text" id="roomInput" placeholder="รหัสห้อง (เช่น room1)" maxlength="20">
      <button class="btn" onclick="joinRoom()">เข้าร่วมห้อง 加入房间</button>
    </div>
    <p style="font-size:12px;opacity:.5;margin-top:12px;">ใส่รหัสห้องเดียวกันกับเพื่อนเพื่อเล่นด้วยกัน</p>
  </div>`;
}

function waitingHTML(s) {
  const myIdx = s.myIndex;
  const filled = s.players.filter(Boolean).length;
  const slots = s.playerNames.map((name, i) => {
    const isMe = i === myIdx;
    const filled = !!s.players[i];
    return `<div class="player-slot ${filled ? 'filled' : ''}">
      <div class="slot-num">${i+1}</div>
      <span>${filled ? (name || 'ผู้เล่น') + (isMe ? ' (คุณ)' : '') : 'รอ...'}</span>
    </div>`;
  }).join('');
  const canStart = myIdx === 0 && filled >= 2;
  return `<div class="lobby">
    <h1 style="margin-bottom:.5rem;">รอผู้เล่น... 等待玩家</h1>
    <p>ห้อง: <strong>${roomId}</strong> · ${filled}/4 คน</p>
    <div class="players-waiting">${slots}</div>
    ${canStart ? `<button class="btn btn-green" onclick="startGame()">เริ่มเกม 开始游戏 (${filled} คน)</button>` : ''}
    ${myIdx === 0 && filled < 2 ? '<p style="opacity:.5;font-size:13px;margin-top:8px;">ต้องมีผู้เล่นอย่างน้อย 2 คน</p>' : ''}
    ${myIdx !== 0 ? '<p style="opacity:.6;font-size:13px;margin-top:8px;">รอ Player 1 เริ่มเกม...</p>' : ''}
  </div>`;
}

function gameHTML(s) {
  const myIdx = s.myIndex;
  const isMyTurn = s.current === myIdx && s.phase === 'play';
  const wcColor = s.wildColor ? COLORS_HEX[s.wildColor] : '#555';
  const dir = s.direction === 1 ? '⟳' : '⟲';

  const oppOrder = [1, 2, 3].map(offset => (myIdx + offset) % 4);
  const opps = oppOrder.map(pi => {
    const name = s.playerNames[pi] || `P${pi+1}`;
    const connected = !!s.players[pi];
    const active = s.current === pi;
    const count = s.handCounts[pi];
    const cards = Array(Math.min(count, 12)).fill('<div class="mini-card"></div>').join('');
    return `<div class="opp-zone ${active ? 'active' : ''} ${!connected ? 'empty' : ''}">
      <div class="opp-name">${name} ${active ? '⭐' : ''} <span style="opacity:.6;font-size:11px;">(${count})</span></div>
      <div class="opp-cards">${cards || '<span style="opacity:.4;font-size:12px;">ไม่มีไพ่</span>'}</div>
    </div>`;
  }).join('');

  const top = s.discardTop;
  const myHand = s.myHand || [];
  const handHTML = myHand.map(card => {
    const p = isMyTurn && canPlayClient(card, top, s.wildColor);
    return cardHTML(card, p);
  }).join('');

  return `<div class="game">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;">
      <span>UNO 生词 🍎 · ห้อง: <strong>${roomId}</strong></span>
      <span>${dir} <span class="color-dot-sm" style="background:${wcColor}"></span></span>
    </div>
    <div class="opponents">${opps}</div>
    <div class="status-bar">${s.message}</div>
    <div class="table-center">
      <div class="draw-pile" onclick="drawCard()" title="抽牌">🂠<span>${s.deckCount}</span></div>
      <div class="discard-area">${top ? cardHTML(top, false) : ''}</div>
    </div>
    <div class="my-area ${isMyTurn ? 'active' : ''}">
      <div class="my-label">
        <span>${s.playerNames[myIdx] || 'คุณ'} ${isMyTurn ? '⭐ ตาของคุณ!' : ''}</span>
        <span style="opacity:.6">${myHand.length} ใบ</span>
      </div>
      <div class="hand">${handHTML}</div>
      ${isMyTurn ? '<div style="text-align:center;margin-top:8px;"><button class="btn btn-gray btn-sm" onclick="drawCard()">แตะไพ่กลาง / 抽牌</button></div>' : ''}
    </div>
  </div>`;
}

function canPlayClient(card, top, wildColor) {
  if (!top) return false;
  if (card.type === 'wild' || card.type === 'wild+4') return true;
  if (card.color === wildColor) return true;
  if (card.type === 'number' && top.type === 'number' && card.value === top.value) return true;
  if (card.type !== 'number' && card.type === top.type) return true;
  return false;
}

function colorPickerHTML() {
  const colors = ['red','green','blue','yellow'];
  const dots = colors.map(c => `<div class="color-dot" style="background:${COLORS_HEX[c]}" onclick="pickColor('${c}')" title="${COLOR_ZH[c]}"></div>`).join('');
  return `<div class="color-picker-overlay">
    <div class="color-picker-box">
      <h3>เลือกสี 选择颜色</h3>
      <div class="colors">${dots}</div>
    </div>
  </div>`;
}

function winHTML(s) {
  const pi = s.winner;
  const name = pi === s.myIndex ? 'คุณ 🏆' : (s.playerNames[pi] || `Player ${pi+1}`);
  const isMe = pi === s.myIndex;
  return `<div class="win-overlay">
    <div class="win-box">
      <div style="font-size:56px;margin-bottom:.5rem;">${isMe ? '🏆' : '😢'}</div>
      <h2 style="font-size:22px;margin-bottom:.5rem;">${name} ชนะ!</h2>
      <p style="opacity:.7;margin-bottom:1.5rem;">${isMe ? 'ยอดเยี่ยม! 恭喜你!' : 'ลองใหม่นะ!'}</p>
      ${s.myIndex === 0 ? `<button class="btn btn-green" onclick="restartGame()">เล่นอีก 再玩一次</button>` : '<p style="opacity:.6">รอ Player 1 เริ่มเกมใหม่...</p>'}
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
